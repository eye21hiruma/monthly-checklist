<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="月間チェックリスト">
<title>月間チェックリスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Kochi Pro', 'ヒラギノ丸ゴ Pro', 'Yu Gothic', sans-serif;
    background: #fdf6f0;
    color: #4a3728;
    min-height: 100vh;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }

  /* ヘッダー */
  header {
    background: linear-gradient(135deg, #c9957a 0%, #e8b99a 100%);
    color: white;
    text-align: center;
    padding: 22px 20px 16px;
    padding-top: calc(22px + env(safe-area-inset-top));
  }
  header h1 { font-size: 1.3rem; letter-spacing: 0.08em; }

  /* 月ナビ（固定） */
  .month-nav {
    position: sticky; top: 0; z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #fff8f3;
    border-bottom: 1px solid #f0ddd0;
    box-shadow: 0 1px 6px rgba(180,120,90,0.12);
  }
  .month-nav .nav-side {
    display: flex; align-items: center; gap: 6px;
  }
  .month-nav button {
    background: #c9957a; color: white; border: none;
    border-radius: 50%; width: 40px; height: 40px;
    font-size: 1.2rem; cursor: pointer;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .month-nav button:active { background: #9a6a50; }
  .month-label {
    font-size: 1.2rem; font-weight: bold;
    min-width: 110px; text-align: center;
    user-select: none;
  }
  .btn-setting {
    background: none; border: 1px solid #d0a080;
    color: #8a5c3a; padding: 7px 12px;
    border-radius: 20px; font-size: 1.1rem;
    cursor: pointer; touch-action: manipulation;
    white-space: nowrap; line-height: 1;
  }
  .btn-setting:active { background: #fff0e8; }

  /* 進捗バー */
  .progress-wrap {
    padding: 10px 16px 6px;
    background: #fff8f3;
    border-bottom: 1px solid #f0ddd0;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; margin-bottom: 4px; color: #9a7060;
  }
  .progress-bar {
    height: 8px; background: #f0ddd0;
    border-radius: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9957a, #e8b99a);
    border-radius: 8px;
    transition: width 0.4s ease;
  }

  /* メインリスト */
  main { max-width: 680px; margin: 16px auto; padding: 0 12px; }

  /* 空メッセージ */
  .empty-msg {
    text-align: center; color: #b09080;
    padding: 40px 20px; font-size: 0.9rem; line-height: 1.8;
  }

  /* 日付グループ */
  .day-group { margin-bottom: 12px; }
  .day-label {
    font-size: 0.78rem; font-weight: bold;
    color: #9a7060; margin-bottom: 6px;
    padding-left: 4px; letter-spacing: 0.04em;
  }
  .day-label .weekday { font-weight: normal; margin-left: 4px; color: #b09080; }
  .day-label .weekday.sat { color: #4488cc; }
  .day-label .weekday.sun { color: #cc4444; }

  /* タスクカード */
  .task-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(180,120,90,0.1);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .task-row {
    display: flex; align-items: center; gap: 12px;
    min-height: 56px; padding: 12px 14px;
    cursor: pointer; user-select: none;
    touch-action: manipulation;
  }
  .task-row:active { background: #fffaf7; }

  .task-row input[type="checkbox"] {
    width: 26px; height: 26px;
    accent-color: #c9957a;
    cursor: pointer; flex-shrink: 0;
  }

  .task-cat-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-income  { background: #e08030; }
  .dot-card    { background: #4080d0; }
  .dot-fixed   { background: #40a060; }
  .dot-other   { background: #9050c0; }

  .task-info { flex: 1; }
  .task-name {
    font-size: 0.95rem; line-height: 1.4;
    transition: color 0.2s, text-decoration 0.2s;
  }
  .task-sub {
    font-size: 0.72rem; color: #b09080; margin-top: 2px;
  }

  .task-row.done .task-name {
    text-decoration: line-through; color: #c0a898;
  }
  .task-row.done { background: #fdfaf8; }

  /* カテゴリラベル（右端） */
  .cat-badge {
    font-size: 0.65rem; padding: 2px 7px;
    border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-income { background: #fff0e0; color: #c07030; }
  .badge-card   { background: #e8f0ff; color: #3060b0; }
  .badge-fixed  { background: #e8fff0; color: #307050; }
  .badge-other  { background: #f0e8ff; color: #7040b0; }

  /* 件数（手順の進み具合） */
  .sub-count {
    font-size: 0.72rem; color: #b58a6a;
    background: #fff3ea; border-radius: 8px;
    padding: 1px 7px; margin-left: 4px; white-space: nowrap;
  }

  /* 子チェック（手順） */
  .sub-list {
    padding: 2px 14px 10px 52px;
    border-top: 1px dashed #f2e6dd;
  }
  .sub-row {
    display: flex; align-items: center; gap: 12px;
    min-height: 42px; padding: 6px 0;
    cursor: pointer; user-select: none; touch-action: manipulation;
  }
  .sub-row input[type="checkbox"] {
    width: 22px; height: 22px;
    accent-color: #c9957a; flex-shrink: 0; cursor: pointer;
  }
  .sub-name { font-size: 0.88rem; color: #5a4636; line-height: 1.4; }
  .sub-row.done .sub-name { text-decoration: line-through; color: #bba898; }

  /* ─── 設定パネル ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45);
  }
  .overlay.open { display: flex; align-items: flex-end; }

  .setting-panel {
    background: #fdf6f0;
    width: 100%; max-height: 90vh;
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .setting-panel header {
    background: none;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 18px 12px;
    border-bottom: 1px solid #f0ddd0;
    padding-top: 18px;
  }
  .setting-panel header h2 { font-size: 1rem; color: #4a3728; }
  .btn-close {
    background: #f0ddd0; border: none; color: #7a5c4a;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .setting-list { padding: 12px 16px; }
  .setting-item {
    background: white; border-radius: 12px;
    margin-bottom: 8px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(180,120,90,0.08);
  }
  .s-top {
    display: flex; align-items: center; gap: 10px;
  }
  .s-bottom {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; flex-wrap: wrap;
  }
  .s-bottom .s-fld-label {
    font-size: 0.72rem; color: #b09080;
  }
  .setting-item .s-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .setting-item .s-name {
    flex: 1; font-size: 0.9rem; line-height: 1.3;
  }
  .setting-item .s-name input[type="text"] {
    width: 100%; border: none; background: none;
    font-size: 0.9rem; color: #4a3728;
    font-family: inherit; outline: none;
  }
  .day-input-wrap {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .day-input-wrap input[type="number"] {
    width: 46px; text-align: center;
    border: 1px solid #e0c8b8; border-radius: 8px;
    padding: 6px 4px; font-size: 0.9rem; color: #4a3728;
    font-family: inherit;
  }
  .day-input-wrap span { font-size: 0.82rem; color: #9a7060; }
  .eom-note {
    flex-basis: 100%; font-size: 0.7rem; color: #b58a6a;
    margin-top: 2px;
  }
  .eom-note:empty { display: none; }
  .btn-del {
    background: none; border: none; color: #c09080;
    font-size: 1.2rem; cursor: pointer; padding: 4px;
    flex-shrink: 0; touch-action: manipulation;
  }
  .btn-del:active { color: #a04030; }

  .cat-select {
    border: 1px solid #e0c8b8; border-radius: 8px;
    padding: 5px 6px; font-size: 0.8rem; color: #4a3728;
    background: white; font-family: inherit; flex-shrink: 0;
  }

  /* 手順（子チェック）の編集 */
  .sub-edit {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px dashed #f0ddd0;
  }
  .sub-edit-title { font-size: 0.72rem; color: #a08070; margin-bottom: 6px; }
  .sub-edit-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .sub-edit-row input[type="text"] {
    flex: 1; border: 1px solid #e0c8b8; border-radius: 8px;
    padding: 7px 9px; font-size: 0.85rem; color: #4a3728;
    font-family: inherit; outline: none;
  }
  .btn-add-sub {
    background: none; border: none; color: #a07050;
    font-size: 0.8rem; cursor: pointer; padding: 4px 0;
    touch-action: manipulation;
  }

  /* 手順の並び替えハンドル */
  .drag-handle {
    color: #c0a090; font-size: 1.15rem; line-height: 1;
    padding: 2px 8px 2px 0; cursor: grab; flex-shrink: 0;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .sub-edit-row.dragging { opacity: 0.3; }
  .sub-edit-row.drop-target {
    border-top: 2px solid #c9957a;
    margin-top: -2px;
  }

  .btn-add-task {
    width: 100%; padding: 13px;
    background: white; border: 1.5px dashed #d0a888;
    border-radius: 12px; color: #a07050;
    font-size: 0.88rem; cursor: pointer;
    margin-top: 4px; touch-action: manipulation;
  }
  .btn-add-task:active { background: #fff5ee; }

  .setting-save-area { padding: 12px 16px 16px; }
  .btn-save {
    width: 100%; padding: 14px;
    background: #c9957a; color: white; border: none;
    border-radius: 12px; font-size: 1rem;
    cursor: pointer; touch-action: manipulation;
  }
  .btn-save:active { background: #a07050; }

  /* バックアップ（端末間の引き継ぎ） */
  .backup-area {
    margin: 0 16px 20px; padding: 14px;
    background: #fff8f3; border: 1px solid #f0ddd0;
    border-radius: 12px;
  }
  .backup-title { font-size: 0.9rem; font-weight: bold; color: #8a5c3a; }
  .backup-desc { font-size: 0.74rem; color: #a08070; margin: 4px 0 10px; line-height: 1.55; }
  .btn-backup {
    width: 100%; padding: 11px; margin-bottom: 8px;
    background: white; border: 1px solid #d0a888;
    border-radius: 10px; color: #8a5c3a;
    font-size: 0.88rem; cursor: pointer;
    touch-action: manipulation; font-family: inherit;
  }
  .btn-backup:last-child { margin-bottom: 0; }
  .btn-backup:active { background: #fff0e8; }
  .sync-status {
    font-size: 0.74rem; color: #8a7060;
    margin-top: 8px; text-align: center; min-height: 1em;
    line-height: 1.4;
  }

  /* メイン画面の保存して同期する */
  .main-sync-area { text-align: center; padding: 14px 0 4px; }
  .btn-main-sync {
    width: 100%; max-width: 320px; padding: 13px;
    background: #c9957a; color: white; border: none;
    border-radius: 12px; font-size: 0.95rem;
    cursor: pointer; touch-action: manipulation;
    font-family: inherit;
  }
  .btn-main-sync:active { background: #a07050; }

  @media (min-width: 480px) {
    .overlay { align-items: center; }
    .setting-panel {
      max-width: 480px; margin: auto;
      border-radius: 20px; max-height: 85vh;
    }
  }
</style>
</head>
<body>

<header>
  <h1>🗓️ 月間チェックリスト</h1>
</header>

<div class="month-nav">
  <div class="nav-side">
    <button id="prevBtn">‹</button>
    <button id="nextBtn">›</button>
  </div>
  <div class="month-label" id="monthLabel"></div>
  <button class="btn-setting" id="openSetting">⚙</button>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 0 件完了</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<main id="mainContent"></main>

<!-- 設定パネル -->
<div class="overlay" id="overlay">
  <div class="setting-panel">
    <header>
      <h2>⚙ 項目を編集</h2>
      <button class="btn-close" id="closeSetting">✕</button>
    </header>
    <div class="setting-list" id="settingList"></div>
    <div style="padding:0 16px">
      <button class="btn-add-task" id="addTaskBtn">＋ 項目を追加する</button>
    </div>
    <div class="setting-save-area">
      <button class="btn-save" id="saveBtn">保存して同期する</button>
      <div id="syncStatus" class="sync-status"></div>
    </div>
  </div>
</div>

<script>
// ===== カテゴリ定義 =====
const CATS = {
  income: { label: "売上・入金",       dot: "dot-income", badge: "badge-income" },
  card:   { label: "クレジットカード", dot: "dot-card",   badge: "badge-card"   },
  fixed:  { label: "固定費",           dot: "dot-fixed",  badge: "badge-fixed"  },
  other:  { label: "その他",           dot: "dot-other",  badge: "badge-other"  },
};

const WEEKDAYS = ["日","月","火","水","木","金","土"];
const CAT_ORDER = ["income","card","fixed","other"];

// ===== デフォルト項目 =====
const DEFAULT_TASKS = [
  { id:"u1779969643809", name:"(未払金)リベシティ(研修･自己研鑽費)入力", cat:"card",  day:1 },
  { id:"u1779972063814", name:"リベシティ領収証ダウンロード､フォルダ移動", cat:"other", day:1 },
  { id:"u1779975525005", name:"(円普通預金)口座振替ミツイスミトモカード(未払金)入力", cat:"card", day:15 },
  { id:"u1779975125671", name:"(事業主借)楽天モバイル(通信費)入力", cat:"other", day:20 },
  { id:"u1779975293771", name:"楽天モバイル領収証ダウンロード､フォルダ移動", cat:"other", day:20 },
  { id:"u1779972203866", name:"(未払金)東北電力(水道光熱費)入力", cat:"card", day:20 },
  { id:"u1779972274049", name:"東北電力領収証ダウンロード､フォルダ移動", cat:"other", day:20 },
  { id:"u1779972472367", name:"クレジットカード明細書を確認しながら(未払金)の日付調整､添付", cat:"other", day:28 },
  { id:"u1779972355085", name:"(事業主借)家賃(地代家賃)入力", cat:"fixed", day:28 },
  { id:"u1779972421285", name:"クレジットカード明細書ダウンロード､フォルダ移動", cat:"other", day:28 },
  { id:"u1779972967869", name:"(仕入高)クレジットカード明細書を確認しながら入力", cat:"card", day:28 },
  { id:"u1779973198518", name:"東北電力／タックスナップ添付､登録", cat:"other", day:28 },
  { id:"u1779973239601", name:"リベシティ／タックスナップ添付､登録確認", cat:"other", day:28 },
  { id:"u1780192122866", name:"楽天モバイル／タックスナップ添付､登録確認", cat:"other", day:28 },
];

// ===== 状態 =====
const today = new Date();
let currentYear  = today.getFullYear();
let currentMonth = today.getMonth() + 1;

function loadTasks() {
  try {
    const raw = localStorage.getItem("副業タスク設定");
    return raw ? JSON.parse(raw) : DEFAULT_TASKS.map(t => ({...t}));
  } catch { return DEFAULT_TASKS.map(t => ({...t})); }
}
function saveTasks(tasks) {
  localStorage.setItem("副業タスク設定", JSON.stringify(tasks));
}

function checkKey(y, m) { return `副業チェック_${y}_${String(m).padStart(2,"0")}`; }
function loadCheck(y, m) {
  try { const r = localStorage.getItem(checkKey(y,m)); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveCheck(y, m, obj) { localStorage.setItem(checkKey(y,m), JSON.stringify(obj)); }

// ===== 実際の日数に合わせる =====
function realDay(y, m, day) {
  const lastDay = new Date(y, m, 0).getDate(); // 月末日
  return Math.min(day, lastDay);
}

// ===== メイン描画 =====
function render() {
  const y = currentYear, mo = currentMonth;
  const tasks = loadTasks();
  const checked = loadCheck(y, mo);

  document.getElementById("monthLabel").textContent = `${y}年 ${mo}月`;

  // 今月に表示する項目だけにしぼる（毎月 / 毎年◯月 / 今月のみ）
  const thisYM = `${y}-${String(mo).padStart(2,"0")}`;
  const applicable = tasks.filter(t => {
    if (t.onceYM) return t.onceYM === thisYM; // 今月のみ：指定の年月だけ
    if (t.month) return t.month === mo;        // 毎年◯月
    return true;                               // 毎月
  });

  // 進捗（手順がある項目は、手順がすべて済んだら完了とみなす）
  const total = applicable.length;
  const done  = applicable.filter(t => {
    const subs = Array.isArray(t.subs) ? t.subs : [];
    if (subs.length > 0) return subs.every(s => checked[s.id]);
    return !!checked[t.id];
  }).length;
  const pct   = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById("progressText").textContent    = `${done} / ${total} 件完了`;
  document.getElementById("progressPercent").textContent = `${pct}%`;
  document.getElementById("progressFill").style.width    = pct + "%";

  const main = document.getElementById("mainContent");
  main.innerHTML = "";

  if (tasks.length === 0) {
    main.innerHTML = `<div class="empty-msg">項目がありません。<br>右上の「⚙」から追加してください。</div>`;
    return;
  }
  if (applicable.length === 0) {
    main.innerHTML = `<div class="empty-msg">${mo}月に予定された項目はありません。<br>毎月の項目や、毎年${mo}月の項目を入れるとここに表示されます。</div>`;
    return;
  }

  // 日付順に並べる（同じ日は入力順）
  const sorted = [...applicable].sort((a, b) => realDay(y, mo, a.day) - realDay(y, mo, b.day));

  // 日付ごとにグループ化
  const groups = {};
  sorted.forEach(t => {
    const d = realDay(y, mo, t.day);
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });

  Object.keys(groups).sort((a,b)=>+a-+b).forEach(day => {
    const date = new Date(y, mo - 1, +day);
    const w = date.getDay();
    const wLabel = WEEKDAYS[w];
    const wClass = w === 0 ? "sun" : w === 6 ? "sat" : "";

    const group = document.createElement("div");
    group.className = "day-group";

    const label = document.createElement("div");
    label.className = "day-label";
    label.innerHTML = `${day}日 <span class="weekday ${wClass}">${wLabel}曜日</span>`;
    group.appendChild(label);

    groups[day].forEach(task => {
      const subs = Array.isArray(task.subs) ? task.subs : [];
      const hasSubs = subs.length > 0;
      const subCount = subs.filter(s => checked[s.id]).length;
      const isDone = hasSubs ? (subCount === subs.length) : !!checked[task.id];
      const cat = CATS[task.cat] || CATS.other;

      const card = document.createElement("div");
      card.className = "task-card";

      const row = document.createElement("label");
      row.className = "task-row" + (isDone ? " done" : "");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = isDone;
      cb.addEventListener("change", () => {
        const c = loadCheck(y, mo);
        if (hasSubs) {
          // 親を操作したら、中の手順すべてに反映
          subs.forEach(s => { if (cb.checked) c[s.id] = true; else delete c[s.id]; });
        } else {
          if (cb.checked) c[task.id] = true; else delete c[task.id];
        }
        saveCheck(y, mo, c);
        pushState();
        render();
      });

      const dot = document.createElement("div");
      dot.className = `task-cat-dot ${cat.dot}`;

      const info = document.createElement("div");
      info.className = "task-info";
      const countTxt = hasSubs ? ` <span class="sub-count">${subCount}/${subs.length}</span>` : "";
      const ynote = task.onceYM
        ? `<div class="task-sub">📌 今月のみ</div>`
        : (task.month ? `<div class="task-sub">📌 毎年${task.month}月のみ</div>` : "");
      info.innerHTML = `<div class="task-name">${escHtml(task.name)}${countTxt}</div>${ynote}`;

      const badge = document.createElement("div");
      badge.className = `cat-badge ${cat.badge}`;
      badge.textContent = cat.label;

      row.append(cb, dot, info, badge);
      card.appendChild(row);

      // 子チェック（手順）
      if (hasSubs) {
        const subList = document.createElement("div");
        subList.className = "sub-list";
        subs.forEach(s => {
          const sdone = !!checked[s.id];
          const srow = document.createElement("label");
          srow.className = "sub-row" + (sdone ? " done" : "");
          const scb = document.createElement("input");
          scb.type = "checkbox";
          scb.checked = sdone;
          scb.addEventListener("change", () => {
            const c = loadCheck(y, mo);
            if (scb.checked) c[s.id] = true; else delete c[s.id];
            saveCheck(y, mo, c);
            pushState();
            render();
          });
          const sname = document.createElement("div");
          sname.className = "sub-name";
          sname.textContent = s.name;
          srow.append(scb, sname);
          subList.appendChild(srow);
        });
        card.appendChild(subList);
      }

      group.appendChild(card);
    });

    main.appendChild(group);
  });

  // 保存して同期する
  const sa = document.createElement("div");
  sa.className = "main-sync-area";
  const sbtn = document.createElement("button");
  sbtn.className = "btn-main-sync";
  sbtn.textContent = "🔄 保存して同期する";
  sbtn.addEventListener("click", () => {
    pushState();
  });
  const sStat = document.createElement("div");
  sStat.className = "sync-status";
  sa.append(sbtn, sStat);
  main.appendChild(sa);
}

// ===== 設定パネル =====
let editingTasks = [];

function openSetting() {
  editingTasks = loadTasks().map(t => ({...t}));
  editingTasks.sort((a, b) => a.day - b.day);
  renderSettingList();
  document.getElementById("overlay").classList.add("open");
}
function closeSetting() {
  document.getElementById("overlay").classList.remove("open");
}

function renderSettingList() {
  const list = document.getElementById("settingList");
  list.innerHTML = "";

  editingTasks.forEach((task, idx) => {
    const cat = CATS[task.cat] || CATS.other;
    const item = document.createElement("div");
    item.className = "setting-item";

    const dot = document.createElement("div");
    dot.className = `s-dot ${cat.dot}`;

    const nameWrap = document.createElement("div");
    nameWrap.className = "s-name";
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = task.name;
    nameInput.placeholder = "項目名";
    nameInput.addEventListener("input", e => { editingTasks[idx].name = e.target.value; });
    nameWrap.appendChild(nameInput);

    const catSel = document.createElement("select");
    catSel.className = "cat-select";
    CAT_ORDER.forEach(k => {
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = CATS[k].label;
      if (k === task.cat) opt.selected = true;
      catSel.appendChild(opt);
    });
    catSel.addEventListener("change", e => {
      editingTasks[idx].cat = e.target.value;
      const newDot = `s-dot ${(CATS[e.target.value]||CATS.other).dot}`;
      dot.className = newDot;
    });

    // 頻度（毎月 / 毎年◯月だけ / 今月のみ）
    const freqSel = document.createElement("select");
    freqSel.className = "cat-select";
    const optEvery = document.createElement("option");
    optEvery.value = "0";
    optEvery.textContent = "毎月";
    if (!task.month && !task.onceYM) optEvery.selected = true;
    freqSel.appendChild(optEvery);
    // 今月のみ（今表示している月だけ）
    const optOnce = document.createElement("option");
    optOnce.value = "once";
    optOnce.textContent = `今月（${currentYear}年${currentMonth}月）のみ`;
    if (task.onceYM) optOnce.selected = true;
    freqSel.appendChild(optOnce);
    for (let mm = 1; mm <= 12; mm++) {
      const opt = document.createElement("option");
      opt.value = String(mm);
      opt.textContent = `毎年${mm}月`;
      if (!task.onceYM && task.month === mm) opt.selected = true;
      freqSel.appendChild(opt);
    }
    freqSel.addEventListener("change", e => {
      const v = e.target.value;
      if (v === "once") {
        // 今表示している月だけに表示する
        editingTasks[idx].onceYM = `${currentYear}-${String(currentMonth).padStart(2,"0")}`;
        editingTasks[idx].month = 0;
      } else {
        delete editingTasks[idx].onceYM;
        editingTasks[idx].month = parseInt(v, 10); // 0=毎月
      }
    });

    const dayWrap = document.createElement("div");
    dayWrap.className = "day-input-wrap";
    const dayInput = document.createElement("input");
    dayInput.type = "number";
    dayInput.min = 1; dayInput.max = 31;
    dayInput.value = task.day;
    const dayUnit = document.createElement("span");
    dayUnit.textContent = "日";
    // 月末に自動調整される注意書き（29〜31日のとき表示）
    const eomNote = document.createElement("div");
    eomNote.className = "eom-note";
    function updateEomNote(v) {
      eomNote.textContent = v >= 29 ? "※短い月は自動で月末に調整されます" : "";
    }
    updateEomNote(task.day);
    dayInput.addEventListener("change", e => {
      let v = parseInt(e.target.value) || 1;
      v = Math.max(1, Math.min(31, v));
      editingTasks[idx].day = v;
      e.target.value = v;
      updateEomNote(v);
    });
    dayWrap.append(dayInput, dayUnit);

    const delBtn = document.createElement("button");
    delBtn.className = "btn-del";
    delBtn.textContent = "×";
    delBtn.title = "削除";
    delBtn.addEventListener("click", () => {
      if (confirm(`「${task.name}」を削除しますか？`)) {
        editingTasks.splice(idx, 1);
        renderSettingList();
      }
    });

    const top = document.createElement("div");
    top.className = "s-top";
    top.append(dot, nameWrap, delBtn);

    const bottom = document.createElement("div");
    bottom.className = "s-bottom";
    bottom.append(catSel, freqSel, dayWrap, eomNote);

    // 手順（子チェック）の編集
    if (!Array.isArray(editingTasks[idx].subs)) editingTasks[idx].subs = [];
    const subEdit = document.createElement("div");
    subEdit.className = "sub-edit";
    const subTitle = document.createElement("div");
    subTitle.className = "sub-edit-title";
    subTitle.textContent = "手順（チェックを分けたいとき）";
    subEdit.appendChild(subTitle);

    let dragSrcSidx = null;

    editingTasks[idx].subs.forEach((s, sidx) => {
      const sr = document.createElement("div");
      sr.className = "sub-edit-row";
      sr.dataset.sidx = sidx;

      // ドラッグハンドル
      const handle = document.createElement("div");
      handle.className = "drag-handle";
      handle.textContent = "⠿";
      handle.title = "長押し or ドラッグで並び替え";

      const si = document.createElement("input");
      si.type = "text";
      si.value = s.name;
      si.placeholder = "手順名（例：明細ダウンロード）";
      si.addEventListener("input", e => { editingTasks[idx].subs[sidx].name = e.target.value; });
      const sd = document.createElement("button");
      sd.className = "btn-del";
      sd.textContent = "×";
      sd.title = "削除";
      sd.addEventListener("click", () => {
        editingTasks[idx].subs.splice(sidx, 1);
        renderSettingList();
      });

      // ── デスクトップ: HTML5 ドラッグ ──
      sr.draggable = true;
      sr.addEventListener("dragstart", e => {
        dragSrcSidx = sidx;
        e.dataTransfer.effectAllowed = "move";
        requestAnimationFrame(() => sr.classList.add("dragging"));
      });
      sr.addEventListener("dragend", () => {
        sr.classList.remove("dragging");
        subEdit.querySelectorAll(".sub-edit-row").forEach(r => r.classList.remove("drop-target"));
        dragSrcSidx = null;
      });
      sr.addEventListener("dragover", e => {
        e.preventDefault();
        if (dragSrcSidx !== null && dragSrcSidx !== sidx) {
          subEdit.querySelectorAll(".sub-edit-row").forEach(r => r.classList.remove("drop-target"));
          sr.classList.add("drop-target");
        }
      });
      sr.addEventListener("drop", e => {
        e.preventDefault();
        sr.classList.remove("drop-target");
        if (dragSrcSidx !== null && dragSrcSidx !== sidx) {
          const subs = editingTasks[idx].subs;
          const [moved] = subs.splice(dragSrcSidx, 1);
          const insertAt = sidx > dragSrcSidx ? sidx - 1 : sidx;
          subs.splice(insertAt, 0, moved);
          renderSettingList();
        }
      });

      // ── モバイル: タッチ開始（ハンドルのみ） ──
      handle.addEventListener("touchstart", e => {
        e.preventDefault();
        dragSrcSidx = sidx;
        sr.classList.add("dragging");
      }, { passive: false });

      sr.append(handle, si, sd);
      subEdit.appendChild(sr);
    });

    // ── モバイル: タッチ移動・終了（コンテナで検知） ──
    subEdit.addEventListener("touchmove", e => {
      if (dragSrcSidx === null) return;
      e.preventDefault();
      const y = e.touches[0].clientY;
      const rows = [...subEdit.querySelectorAll(".sub-edit-row:not(.dragging)")];
      rows.forEach(r => r.classList.remove("drop-target"));
      const target = rows.find(r => {
        const rect = r.getBoundingClientRect();
        return y >= rect.top && y <= rect.bottom;
      });
      if (target) target.classList.add("drop-target");
    }, { passive: false });

    subEdit.addEventListener("touchend", e => {
      if (dragSrcSidx === null) return;
      const y = e.changedTouches[0].clientY;
      const rows = [...subEdit.querySelectorAll(".sub-edit-row:not(.dragging)")];
      rows.forEach(r => r.classList.remove("drop-target"));
      const target = rows.find(r => {
        const rect = r.getBoundingClientRect();
        return y >= rect.top && y <= rect.bottom;
      });
      if (target) {
        const tSidx = parseInt(target.dataset.sidx);
        if (!isNaN(tSidx) && tSidx !== dragSrcSidx) {
          const subs = editingTasks[idx].subs;
          const [moved] = subs.splice(dragSrcSidx, 1);
          const insertAt = tSidx > dragSrcSidx ? tSidx - 1 : tSidx;
          subs.splice(insertAt, 0, moved);
        }
      }
      dragSrcSidx = null;
      renderSettingList();
    });

    const addSub = document.createElement("button");
    addSub.className = "btn-add-sub";
    addSub.textContent = "＋ 手順を追加";
    addSub.addEventListener("click", () => {
      editingTasks[idx].subs.push({ id: "s" + Date.now() + Math.floor(Math.random()*1000), name: "" });
      renderSettingList();
    });
    subEdit.appendChild(addSub);

    item.append(top, bottom, subEdit);
    list.appendChild(item);
  });
}

function addTask() {
  const newId = "u" + Date.now();
  editingTasks.push({ id: newId, name: "", cat: "other", day: 1, month: 0 });
  renderSettingList();
  // 最後の入力欄にフォーカス
  setTimeout(() => {
    const inputs = document.querySelectorAll(".s-name input");
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function saveSettings() {
  // 名前が空のものは除外、手順の空欄も除外、日付順に並び替え
  const valid = editingTasks
    .filter(t => t.name.trim() !== "")
    .map(t => {
      const subs = Array.isArray(t.subs)
        ? t.subs.filter(s => s.name.trim() !== "")
        : [];
      return { ...t, subs };
    })
    .sort((a, b) => a.day - b.day);
  saveTasks(valid);
  pushState();   // 保存したら自動でクラウドへ送る（全端末に反映）
  closeSetting();
  render();
}

// ===== ユーティリティ =====
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ===== イベント =====
document.getElementById("prevBtn").addEventListener("click", () => {
  currentMonth--;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  render();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  currentMonth++;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  render();
});
document.getElementById("openSetting").addEventListener("click", openSetting);
document.getElementById("closeSetting").addEventListener("click", closeSetting);
document.getElementById("addTaskBtn").addEventListener("click", addTask);
document.getElementById("saveBtn").addEventListener("click", saveSettings);
document.getElementById("overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("overlay")) closeSetting();
});

// ===== 自動同期（Googleドライブと同期：項目＋チェック） =====
const SYNC_URL = "https://script.google.com/macros/s/AKfycbyHN6VKkPJFLmWyh2XLkooJUTZt0Hhf5bXg4clNHrFJQqJV1nJ4pduc3ICTNlUxUWmF/exec";
const MASTER_VER_KEY = "副業マスター版数";
let isApplyingRemote = false;

function setSyncStatus(text) {
  // 設定パネルとメイン画面、両方のステータス表示を更新
  document.querySelectorAll(".sync-status").forEach(el => { el.textContent = text; });
}
function nowTime() {
  return new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
}

// すべての月のチェックを1つにまとめる
function gatherChecks() {
  const checks = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf("副業チェック_") === 0) {
      try { checks[k.replace("副業チェック_", "")] = JSON.parse(localStorage.getItem(k) || "{}"); }
      catch (e) {}
    }
  }
  return checks;
}
function applyChecks(checks) {
  if (!checks || typeof checks !== "object") return;
  Object.keys(checks).forEach(mk => {
    localStorage.setItem("副業チェック_" + mk, JSON.stringify(checks[mk] || {}));
  });
}

// 開いたとき・戻ってきたとき：サーバーが新しければ取り込む
async function syncFromServer() {
  try {
    const res = await fetch(SYNC_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    if (!data) return;
    const localVer = parseInt(localStorage.getItem(MASTER_VER_KEY) || "0", 10);
    const serverVer = data.version || 0;
    // サーバーが新しいときだけ取り込む
    if (serverVer > localVer && serverVer > 0) {
      isApplyingRemote = true;
      if (Array.isArray(data.tasks) && data.tasks.length > 0) saveTasks(data.tasks);
      if (data.checks) applyChecks(data.checks);
      localStorage.setItem(MASTER_VER_KEY, String(serverVer));
      isApplyingRemote = false;
      render();
      setSyncStatus("✓ 最新の状態にしました（" + nowTime() + "）");
    }
  } catch (e) {
    // オフラインなどは無視
  }
}

// 変更したとき：今の全状態（項目＋チェック）をサーバーへ送る
function pushState() {
  if (isApplyingRemote) return; // 取り込み中は送らない
  const version = Date.now();
  localStorage.setItem(MASTER_VER_KEY, String(version));
  const payload = { version: version, tasks: loadTasks(), checks: gatherChecks() };
  setSyncStatus("送信中…");
  try {
    fetch(SYNC_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    }).then(() => {
      setSyncStatus("✓ 同期しました（" + nowTime() + "）");
    }).catch(() => {
      setSyncStatus("⚠ 送信できませんでした。電波の良い所で「今すぐ同期」を押してください。");
    });
  } catch (e) {
    setSyncStatus("⚠ 送信できませんでした。");
  }
}

// 「今すぐ同期」ボタン
function manualSync() {
  pushState();
}

// 画面に戻ってきたら最新を取りに行く
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) syncFromServer();
});

render();
syncFromServer();
</script>
